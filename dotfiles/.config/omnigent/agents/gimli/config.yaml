spec_version: 1
name: gimli

description: >-
  Gimli, son of Gloin: a dev-loop orchestrator who takes a ticket, splits the
  quest into pieces, and sends a small fellowship of Claude and Codex sub-agents
  down the mine to plan, implement, and review it. He writes no code himself, he
  gates at the one-way doors, drives the branch to green CI, and returns only
  when the PR is review-clean. You do the merging.

# gimli's brain runs on the Claude Agent SDK. No model is pinned, so it resolves
# whatever Claude provider `omnigent setup` configured as the default. It only
# orchestrates (git, gh, CI gates, PR formatting) and delegates every code
# change to its role sub-agents.
executor:
  type: omnigent
  context_window: 1000000
  config:
    harness: claude-sdk

async: true
cancellable: true
timers: true

# Typed session inputs. gimli reads these on its first turn (see AGENTS.md
# roster preflight) instead of asking the human to paste context every run.
params:
  ticket_id:
    type: string
    description: >-
      Ticket identifier for this run (e.g. a Jira key like SC-123456). Used to
      fetch context, name the branch, and scope the PR. Optional; if unset,
      gimli asks the human for the ticket or work description.
  base_branch:
    type: string
    default: origin/main
    description: >-
      Branch the work stacks on and that check_pr_nits / reviewers diff
      against. Passed as base_ref to the mechanical checks.

# gimli runs unsandboxed: it only orchestrates and dispatches sub-agents. Its
# system prompt / dev loop lives in the auto-discovered AGENTS.md beside this
# file. cwd is the caller's: launch gimli from the ticket's worktree so git, the
# reviewers, and check_pr_nits all operate on that checkout (the preflight in
# AGENTS.md verifies this and stops if cwd is not a git repo).
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

# A generic shell terminal for long-running work the one-shot sys_os_shell can't
# hold: watching CI, tailing logs, dev servers. NOT for launching sub-agents.
terminals:
  shell:
    command: bash
    allow_cwd_override: true
    os_env:
      type: caller_process
      cwd: .
      sandbox:
        type: none

# Mechanical PR nit checks live in tools/python/check_pr_nits.py and are
# auto-discovered. One tool, check_pr_nits(repo_root, base_ref, modules): this
# build registers one dispatchable tool per file, so scoping to scala/commit is
# a `modules` argument, not a separate tool. The tool subprocess does NOT
# inherit gimli's cwd, so gimli passes repo_root explicitly (the worktree root
# from the preflight's `git rev-parse --show-toplevel`).
tools:
  # The four role sub-agents (see agents/<name>/). Listing them here is enough
  # to call them; each runs its own harness and opens/updates work on the branch.
  agents:
    - agent_a_lead
    - agent_b_plan_critic
    - agent_c_brutal
    - agent_d_databricks

guardrails:
  # An ASK should outlive the human stepping away from the one-way-door gate.
  ask_timeout: 86400
  policies:
    # gimli runs unattended between gates: don't ASK on push. The catastrophic
    # set (force-push, rm -rf /, hard-reset to a remote ref) is still denied.
    blast_radius:
      type: function
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: false
