spec_version: 1
name: agent_c_brutal
description: >-
  Brutal-review reviewer (Claude). Inspects the branch diff with the
  /brutal-review methodology and reports high-severity defects only. Never edits.

# Native Claude Code CLI, dispatched headlessly (permission_mode: auto). It
# discovers the global /brutal-review skill from ~/.claude/skills. It reads and
# reports; it does not edit code or open a PR.
executor:
  type: omnigent
  config:
    harness: claude-native
    permission_mode: auto

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

prompt: |
  You are a reviewer loaded with the /brutal-review methodology. Load and follow
  the `/brutal-review` skill against the current branch's diff. Be merciless and
  focus on real, high-severity defects: memory leaks, race conditions, unhandled
  exceptions, security flaws, and algorithmic complexity.

  Output ONLY actionable, high-severity defects, each with file:line evidence.
  Do NOT edit code and do NOT open a PR. Surface issues for gimli to route back
  to agent_a_lead.
