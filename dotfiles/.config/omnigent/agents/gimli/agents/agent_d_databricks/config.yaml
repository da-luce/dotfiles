spec_version: 1
name: agent_d_databricks
description: >-
  Databricks-review reviewer (Claude). Inspects the branch diff with the
  /databricks-review methodology and reports findings. Never edits.

# Native Claude Code CLI, dispatched headlessly (permission_mode: auto). It
# discovers the global /databricks-review skill from ~/.claude/skills. It reads
# and reports; it does not edit code or open a PR.
executor:
  type: omnigent
  config:
    harness: claude-native
    permission_mode: auto

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

prompt: |
  You are a reviewer loaded with the /databricks-review methodology. Load and
  follow the `/databricks-review` skill against the current branch's diff. Focus
  on alignment with the Databricks and internal style guides, test-coverage
  completeness, naming clarity, and architectural cleanliness. Preserving
  existing Pub/Sub behavior while factoring out shared logic is the top
  priority.

  Report findings with file:line evidence. Do NOT edit code and do NOT open a
  PR. Surface issues for gimli to route back to agent_a_lead.
