# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'schasse/tmux-jump'
set -g @jump-key 'j'

###############################################################################
# Better resurrection after machine sleep or shutdown
###############################################################################
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'

# Set these BEFORE `run tpm` so continuum reads the flag when it loads.
# Relying on tmux-assistant-resurrect to set @continuum-restore is too late:
# it is sourced after continuum, so continuum's boot-time auto-restore sees
# the flag as off and skips restoring.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
# Restore scrollback for normal panes (assistant-resurrect strips this for
# agent panes so they don't flash stale TUI output before resuming).
set -g @resurrect-capture-pane-contents 'on'

###############################################################################
# Prefix
###############################################################################

# Change prefix from Ctrl+b to Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Clear screen and scrollback buffer (kind of)
bind C-l send-keys C-l \; clear-history

###############################################################################
# Pane borders
###############################################################################
set -g pane-border-status top

# Format the text displayed on the border (shows pane index and custom title)
set -g pane-border-format "#{?window_zoomed_flag,#[fg=yellow bold] ZOOM  #[default],}#{pane_index} #{pane_title}"

# Yellow active border when zoomed
set -g pane-active-border-style "#{?window_zoomed_flag,fg=yellow,fg=green}"

# Heavy border lines when zoomed; pane-border-lines can't use format strings
# so hooks update it whenever layout or focused window changes.
set -g pane-border-lines single
set-hook -g window-layout-changed 'if -F "#{window_zoomed_flag}" \
    "set -g pane-border-lines heavy" \
    "set -g pane-border-lines single"'
set-hook -g after-select-window 'if -F "#{window_zoomed_flag}" \
    "set -g pane-border-lines heavy" \
    "set -g pane-border-lines single"'

set -g history-limit 10000
set -g renumber-windows on
set -g status-interval 5

set-option -g allow-rename on
set-option -g automatic-rename on

# Lock the name when manually renamed — disables auto-rename for that window only
bind-key , command-prompt -I "#{window_name}" "rename-window '%%'; set-window-option automatic-rename off; set-window-option allow-rename off"

###############################################################################
# Vim like navigation
###############################################################################

# Vim like navi.
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind 'v' copy-mode
bind-key -T copy-mode-vi Escape send -X cancel  # Make ESC exit visual mode

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Fast pane switching
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

###############################################################################
# Status bar
###############################################################################

# Mode indicator: prefix shown via session-name color change below; text only for copy/sync.
set -g @mode_indicator_prefix_prompt ''
set -g @mode_indicator_copy_prompt 'COPY'
set -g @mode_indicator_sync_prompt 'SYNC'
set -g @mode_indicator_empty_prompt ''
set -g @mode_indicator_copy_mode_style 'fg=yellow,bg=black'
set -g @mode_indicator_sync_mode_style 'fg=purple,bg=black'
set -g @mode_indicator_empty_mode_style 'fg=cyan,bg=black'

set -g @status-bg                  "#222222"
set -g status-style                "bg=#222222,fg=colour8"
set -g status-justify              absolute-centre
set -g status-left-length          30
set -g status-right-length         50

# Session name pill set by window-alert-format.sh (glyphs need bash variables to survive tmux round-trips).
set -g status-left " #S   "

# Window tabs — no hardcoded colors so agent-indicator's per-window style applies.
set -g window-status-separator       " • "
set -g window-status-format          " #W "
set -g window-status-current-format  " #W "
set -g window-status-style           "fg=colour8,bg=default"
set -g window-status-current-style   "fg=colour7,bg=default,bold"
set -g window-status-bell-style      "fg=colour5,bg=default,bold"
set -g window-status-activity-style  "fg=colour6,bg=default"

set -g status-right "#(/Users/dalton.luce/.config/tmux/multi-indicator.sh) "

###############################################################################
# Misc.
###############################################################################

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
# Apply glyph-containing format strings after TPM (glyphs must come from bash variables)
run-shell '~/.config/tmux/window-alert-format.sh'
